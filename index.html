<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hola Mi Vida Hermosa 💛</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#0f172a,#111827,#1e293b);
display:flex;
justify-content:center;
align-items:center;
position:relative;
color:white;
}

/* Fondo estrellas */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{
opacity:0.2;
}
50%{
opacity:1;
}
}

/* TEXTO PRINCIPAL */

.intro{

position:absolute;

z-index:20;

width:100%;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

animation:hideIntro 11s forwards;

}

.intro h1{

font-size:4.5rem;

color:#ffd54f;

text-align:center;

text-shadow:
0 0 10px rgba(255,213,79,0.7),
0 0 20px rgba(255,213,79,0.6),
0 0 40px rgba(255,213,79,0.5);

overflow:hidden;

white-space:nowrap;

border-right:4px solid #ffd54f;

display:inline-block;

width:0;

animation:
typing 6s steps(24,end) forwards,
cursor 0.8s infinite;

}

/* Escribir */

@keyframes typing{
from{
width:0;
}
to{
width:24ch;
}
}

/* Cursor */

@keyframes cursor{
50%{
border-color:transparent;
}
}

/* Desaparece */

@keyframes hideIntro{

0%{
opacity:1;
}

85%{
opacity:1;
}

100%{
opacity:0;
visibility:hidden;
}

}

/* ESCENA FINAL */

.main{

position:absolute;

z-index:25;

display:flex;
flex-direction:column;
align-items:center;

opacity:0;

animation:showMain 4s forwards;
animation-delay:10s;

}

@keyframes showMain{
to{
opacity:1;
}
}

/* RAMO */

.bouquet{

font-size:12rem;

filter:
drop-shadow(0 0 25px rgba(255,213,79,0.7))
drop-shadow(0 0 45px rgba(255,213,79,0.4));

animation:float 4s ease-in-out infinite;

}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-18px);
}

}

/* MENSAJE */

.message{

margin-top:20px;

font-size:1.5rem;

text-align:center;

line-height:2rem;

padding:0 20px;

color:#f8fafc;

text-shadow:0 0 10px rgba(255,255,255,0.2);

}

/* FLORES */

.flower{

position:absolute;

top:-100px;

z-index:5;

pointer-events:none;

animation-name:fall;

animation-timing-function:linear;

animation-iteration-count:infinite;

}

@keyframes fall{

0%{

transform:
translateY(-100px)
rotate(0deg);

opacity:1;

}

100%{

transform:
translateY(120vh)
rotate(360deg);

opacity:0.9;

}

}

/* BRILLOS */

.sparkle{

position:absolute;

width:4px;
height:4px;

background:white;

border-radius:50%;

animation:sparkle 2s infinite;

z-index:2;

}

@keyframes sparkle{

0%,100%{
opacity:0;
transform:scale(0.5);
}

50%{
opacity:1;
transform:scale(1.5);
}

}

/* BOTON MUSICA */

.music-button{

position:fixed;

bottom:30px;

left:50%;

transform:translateX(-50%);

z-index:100;

padding:14px 28px;

border:none;

border-radius:40px;

background:#ffd54f;

color:#111827;

font-size:1rem;

font-weight:bold;

cursor:pointer;

box-shadow:
0 0 15px rgba(255,213,79,0.5);

transition:0.3s;

}

.music-button:hover{

transform:translateX(-50%) scale(1.05);

}

/* AUDIO */

audio{
display:none;
}

/* CELULAR */

@media(max-width:600px){

.intro h1{

font-size:2.2rem;

max-width:100%;

}

.bouquet{
font-size:8rem;
}

.message{

font-size:1.1rem;

line-height:1.7rem;

padding:0 10px;

}

}

</style>
</head>

<body>

<!-- ESTRELLAS -->

<div class="stars"></div>

<!-- TEXTO -->

<div class="intro">
<h1>Hola Mi Vida Hermosa 💛</h1>
</div>

<!-- ESCENA -->

<div class="main">

<div class="bouquet">
💐
</div>

<div class="message">
Eres la casualidad más bonita de mi vida 🌻✨<br>
y cada momento contigo se siente especial 💛
</div>

</div>

<!-- BOTON MUSICA -->

<button class="music-button" onclick="playMusic()">
🎵 Toca para escuchar nuestra canción
</button>

<!-- AUDIO -->

<audio loop id="music">
<source src="amapolas.mp3" type="audio/mpeg">
</audio>

<script>

/* ESTRELLAS */

for(let i=0;i<120;i++){

let star=document.createElement('div');

star.classList.add('star');

star.style.left=Math.random()*100+'vw';
star.style.top=Math.random()*100+'vh';

star.style.animationDuration=
(2+Math.random()*4)+'s';

document.querySelector('.stars').appendChild(star);

}

/* FLORES */

function createFlower(){

let flower=document.createElement('div');

flower.classList.add('flower');

flower.innerHTML='🌻';

flower.style.left=Math.random()*100+'vw';

flower.style.fontSize=
(18+Math.random()*28)+'px';

flower.style.animationDuration=
(6+Math.random()*6)+'s';

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},13000);

}

setInterval(createFlower,220);

/* BRILLOS */

for(let i=0;i<70;i++){

let sparkle=document.createElement('div');

sparkle.classList.add('sparkle');

sparkle.style.left=Math.random()*100+'vw';
sparkle.style.top=Math.random()*100+'vh';

sparkle.style.animationDuration=
(1+Math.random()*3)+'s';

document.body.appendChild(sparkle);

}

/* MUSICA */

function playMusic(){

const music = document.getElementById('music');

music.play();

document.querySelector('.music-button').innerHTML =
'💛 Reproduciendo Amapolas';

}

</script>

</body>
</html>
